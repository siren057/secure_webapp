name: Docker CI/CD

on:
  push:
    branches:
      - main

jobs:

  build-test-scan:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: |
          docker build -t testapp .

      - name: Run container
        run: |
          docker run -d -p 5000:5000 --name testapp testapp
          sleep 10

      - name: Smoke test
        run: |
          curl --fail http://localhost:5000/

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget
          wget https://github.com/aquasecurity/trivy/releases/latest/download/trivy_0.65.0_Linux-64bit.deb
          sudo dpkg -i trivy_0.65.0_Linux-64bit.deb

      - name: Scan image
        run: |
          trivy image --severity HIGH,CRITICAL --ignore-unfixed testapp

      - name: Stop container
        if: always()
        run: |
          docker stop testapp || true
