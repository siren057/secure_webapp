name: Docker CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-test-scan-publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build image
        run: |
          docker build -t testapp .

      - name: Run container
        run: |
          docker run -d -p 5000:5000 --name testapp testapp
          sleep 10

      - name: Smoke test
        run: |
          curl --fail http://localhost:5000/

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget

          wget https://github.com/aquasecurity/trivy/releases/download/v0.71.0/trivy_0.71.0_Linux-64bit.deb

          sudo dpkg -i trivy_0.71.0_Linux-64bit.deb

          trivy --version

      - name: Scan image
        run: |
          trivy image \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            testapp

      - name: Login to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Tag image
        run: |
          docker tag testapp ghcr.io/${{ github.repository }}:latest
          docker tag testapp ghcr.io/${{ github.repository }}:${{ github.sha }}

      - name: Publish image
        run: |
          docker push ghcr.io/${{ github.repository }}:latest
          docker push ghcr.io/${{ github.repository }}:${{ github.sha }}

      - name: Stop container
        if: always()
        run: |
          docker stop testapp || true
          docker rm testapp || true
