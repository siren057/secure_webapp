stages:
  - build
  - test
  - scan
  - publish

variables:
  CI_REGISTRY_IMAGE: $CI_REGISTRY/$CI_PROJECT_PATH
  TRIVY_SEVERITY: "CRITICAL,HIGH"

before_script:
  - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY

build:
  stage: build
  script:
    - docker build -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA -t $CI_REGISTRY_IMAGE:latest .
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA
  only:
    - main

test:
  stage: test
  script:
    - docker run -d -p 5000:5000 --name testapp $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA
    - sleep 5
    - curl --fail http://localhost:5000/
    - docker stop testapp
    - docker rm testapp
  needs:
    - build

scan:
  stage: scan
  script:
    - trivy image --severity $TRIVY_SEVERITY --exit-code 1 --ignore-unfixed $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA
  needs:
    - build

publish:
  stage: publish
  script:
    - docker push $CI_REGISTRY_IMAGE:latest
  needs:
    - scan
  only:
    - main
